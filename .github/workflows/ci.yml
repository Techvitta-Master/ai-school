name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Exposed to Vitest, Playwright, Vite, etc.
      CI: true
      # Matches playwright.config.js default; override if the dev server uses another URL.
      PW_BASE_URL: http://127.0.0.1:5173
      # Repository variable SKIP_E2E: set to 1 in GitHub → Settings → Secrets and variables → Actions → Variables to skip Playwright (scripts/run-e2e.mjs). Omit or leave empty to run e2e.
      SKIP_E2E: ${{ vars.SKIP_E2E }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      - name: E2E smoke test (Playwright)
        run: npm run test:e2e

